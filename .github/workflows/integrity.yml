# Focused integrity checks for the synchronized k-code operating-home fork.
# This workflow intentionally does not restore upstream Firstmate development gates.
name: Integrity

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrity:
    name: Boundaries · skills · links · secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Operating-home integrity
        run: bin/kcode-integrity.sh

      - name: Skill snapshot, Pi package, and sync regressions
        run: |
          set -euo pipefail
          tests/kcode-integrity.test.sh
          tests/kcode-validation-isolation.test.sh
          tests/kcode-skills.test.sh
          tests/kcode-pi-packages.test.sh
          tests/kcode-sync.test.sh
