# Per-repository validation for the synchronized k-code operating-home fork.
#
# k-code does not run upstream Firstmate's full development test matrix.
# Its runtime acceptance surface is the captured-skill restore and sync packaging
# contract, while shell changes still use Firstmate's canonical pinned lint owner.
# This captain-controlled repository trusts its own feature branches to select them.
allow_repo_commands: true

commands:
  lint: 'bin/fm-lint.sh'
  test: 'bin/kcode-integrity.sh && tests/kcode-skills.test.sh && tests/kcode-sync.test.sh'

test:
  evidence:
    store_in_repo: false
